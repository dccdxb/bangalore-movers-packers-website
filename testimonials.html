<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials</title>
</head>
<body>
    <h1>Customer Testimonials</h1>
    <div id="testimonials">
        <div class="testimonial">
            <p>“Great service! Highly recommend!” - John Doe</p>
        </div>
        <div class="testimonial">
            <p>“The team was professional and efficient.” - Jane Smith</p>
        </div>
        <div class="testimonial">
            <p>“Excellent experience from start to finish!” - Emily Johnson</p>
        </div>
    </div>
    <h2>Submit Your Testimonial</h2>
    <form id="testimonialForm">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br>
        <label for="testimonial">Testimonial:</label><br>
        <textarea id="testimonial" name="testimonial" required></textarea><br>
        <input type="submit" value="Submit">
    </form>
    <script>
        // Add JavaScript to handle form submission if needed.
    </script>
</body>
</html>
