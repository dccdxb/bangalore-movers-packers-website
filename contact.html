<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Contact Us</h1>
    </header>
    <section>
        <h2>Contact Information</h2>
        <div class="contact-cards">
            <div class="contact-card">
                <h3>Phone</h3>
                <p>+1 234 567 890</p>
            </div>
            <div class="contact-card">
                <h3>Email</h3>
                <p>info@bangaloremovers.com</p>
            </div>
            <div class="contact-card">
                <h3>Address</h3>
                <p>123 Bangalore St, Bangalore, India</p>
            </div>
        </div>
        <h2>Business Hours</h2>
        <p>Monday - Friday: 9 AM - 6 PM</p>
        <p>Saturday: 10 AM - 4 PM</p>
        <p>Sunday: Closed</p>
    </section>
    <section>
        <h2>Contact Form</h2>
        <form action="/submit-form" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="service-type">Service Type:</label>
            <select id="service-type" name="service-type">
                <option value="residential">Residential</option>
                <option value="commercial">Commercial</option>
                <option value="international">International</option>
            </select>

            <label for="current-address">Current Address:</label>
            <input type="text" id="current-address" name="current-address" required>

            <label for="destination-address">Destination Address:</label>
            <input type="text" id="destination-address" name="destination-address" required>

            <label for="moving-date">Moving Date:</label>
            <input type="date" id="moving-date" name="moving-date" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Submit</button>
        </form>
    </section>
</body>
</html>
